name: PR Preview

on:
  pull_request:
    branches:
      - master
    paths:
      - 'config.json'
      - 'apply-settings.sh'

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run dry-run
        id: dry-run
        continue-on-error: true
        env:
          # 注意: GITHUB_TOKEN は単一リポジトリにしかアクセスできないため、
          # 複数リポジトリの設定を読み取る apply-settings.sh では使用できない
          # PERSONAL_ACCESS_TOKEN を使用する必要がある
          # ただし、フォークからの PR では PERSONAL_ACCESS_TOKEN にアクセスできないため、
          # エラーメッセージを表示して終了する
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          chmod +x ./apply-settings.sh

          # フォークからの PR の場合、PAT が空になる
          if [ -z "$GH_TOKEN" ]; then
            echo "## フォークからの PR では dry-run を実行できません" > summary.txt
            echo "" >> summary.txt
            echo "セキュリティ上の理由から、フォークからの PR では他のリポジトリの情報にアクセスできません。" >> summary.txt
            echo "dry-run を実行するには、base リポジトリに直接 PR を作成してください。" >> summary.txt
            echo "" > details.txt
            exit 0
          fi

          # dry-run を実行（stdout: Markdown サマリー、stderr: 詳細ログ）
          set +e +o pipefail
          ./apply-settings.sh --dry-run --markdown > summary.txt 2> details.txt
          exit_code=$?
          set -eo pipefail

          # エラー時の処理
          if [ $exit_code -ne 0 ]; then
            echo "## エラーが発生しました" > summary.txt
            echo "" >> summary.txt
            echo "終了コード: $exit_code" >> summary.txt
          fi

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-preview-results
          path: |
            summary.txt
            details.txt
          retention-days: 1

      - name: Save PR number
        run: echo ${{ github.event.pull_request.number }} > pr_number.txt

      - name: Upload PR number
        uses: actions/upload-artifact@v4
        with:
          name: pr-number
          path: pr_number.txt
          retention-days: 1
